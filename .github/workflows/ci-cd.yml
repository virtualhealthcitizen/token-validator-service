name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/token-validator-service/token-validator-service:latest
  REGION: us-central1
  REPO_NAME: token-validator-service
  SERVICE_NAME: token-validator-service

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify secrets
        run: |
          missing=()
          [ -z "${{ secrets.GCLOUD_SERVICE_KEY }}" ] && missing+=("GCLOUD_SERVICE_KEY")
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ]     && missing+=("GCP_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are set."

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCLOUD_SERVICE_KEY }}

      - name: Ensure Artifact Registry repository exists
        run: |
          if ! gcloud artifacts repositories describe "${{ env.REPO_NAME }}" \
               --location="${{ env.REGION }}" \
               --project="${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${{ env.REPO_NAME }}" \
              --repository-format=docker \
              --location="${{ env.REGION }}" \
              --description="Docker repo for ${{ env.REPO_NAME }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}"
          else
            echo "Artifact Registry repository '${{ env.REPO_NAME }}' already exists."
          fi

      - name: Configure Docker credential helper
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'pull_request')
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCLOUD_SERVICE_KEY }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --service-account=gh-actions-pipeline@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --region=${{ env.REGION }} \
            --platform=managed \
            --quiet \
            --no-allow-unauthenticated \
            --verbosity=debug
